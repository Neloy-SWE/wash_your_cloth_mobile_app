name: wash_your_cloth_mobile_app
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dio: ^5.9.2
  flutter_bloc: ^9.1.1
  bloc_concurrency: ^0.3.0
  equatable: ^2.0.8
  go_router: ^17.2.3
  get_it: ^9.2.1
  intl: ^0.20.2
  flutter_secure_storage: ^10.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/

  fonts:
    - family: fontRegular
      fonts:
        - asset: assets/font/fontRegular.ttf
    - family: fontMedium
      fonts:
        - asset: assets/font/fontMedium.ttf
    - family: fontBold
      fonts:
        - asset: assets/font/fontBold.ttf
